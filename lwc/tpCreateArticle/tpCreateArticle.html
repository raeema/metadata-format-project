<template>
  <div class="container clearboth createarticle-block" style="position: relative;">
    <div tabindex="0" data-id="error">
      <template if:true={mandatory}>
        <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error" role="alert">
          <span class="slds-assistive-text">error</span>
          <span class="slds-icon_container slds-icon-utility-error slds-m-right_x-small"
            title="Description of icon when needed">
            <svg class="slds-icon slds-icon_x-small" aria-hidden="true">
              <use xlink:href="/assets/icons/utility-sprite/svg/symbols.svg#error"></use>
            </svg>
          </span>
          {errorMessage}
          <div class="slds-notify__close icon" onclick={closeErrorMessage}>
            <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse"
              title="Close"></lightning-icon>
          </div>
        </div>
      </template>
    </div>
    <template if:true={showSpinner}>
      <lightning-spinner class="posFixed" alternative-text="Loading" size="medium"></lightning-spinner>
    </template>
    <div class="col-xs-12 create-article card">
      <div class="col-xs-12 thirteen-list-block nopadding">
        <div if:false={isAutoDisable} class="thirteen-list pull-right list-block col-xs-11 col-sm-7 col-md-6">

          <a class="btn btn-default browse-article" if:true={actionButtonVisibilty.cancel} data-name="admin"
            data-title="Admin" onclick={cancelArticle}>Cancel</a>
          <a class="btn btn-default upload-article preview-article visible-lg" data-id="saveAsDraft"
            onclick={onPreviewArticle}>Preview</a>
          <a class="btn btn-default upload-article" if:true={actionButtonVisibilty.saveAsDraft} data-id="saveAsDraft"
            onclick={handleCallbackToApex}>Save as Draft</a>
          <a class="btn btn-info Sumbit-article" if:true={actionButtonVisibilty.publish} data-id="submit"
            onclick={handleCallbackToApex}>Update</a>
          <a class="btn btn-info Sumbit-article" if:false={actionButtonVisibilty.publish} data-id="submit"
            onclick={handleCallbackToApex}>Publish</a>
          <a class="btn btn-default upload-article" if:true={actionButtonVisibilty.publish} data-id="unpublish"
            onclick={handleUnpublish}>UnPublish</a>

        </div>
        <div if:true={isAutoDisable} class="thirteen-list pull-right list-block col-xs-11 col-sm-7 col-md-6">

          <a disabled=true class="btn btn-default browse-article" if:true={actionButtonVisibilty.cancel}
            data-name="admin" data-title="Admin">Cancel</a>
          <a disabled=true class="btn btn-default upload-article preview-article visible-lg"
            data-id="saveAsDraft">Preview</a>
          <a disabled=true class="btn btn-default upload-article" if:true={actionButtonVisibilty.saveAsDraft}
            data-id="saveAsDraft">Save as Draft</a>
          <a disabled=true class="btn btn-info Sumbit-article" if:true={actionButtonVisibilty.publish}
            data-id="submit">Update</a>
          <a disabled=true class="btn btn-info Sumbit-article" if:false={actionButtonVisibilty.publish}
            data-id="submit">Publish</a>
          <a disabled=true class="btn btn-default upload-article" if:true={actionButtonVisibilty.publish}
            data-id="unpublish">UnPublish</a>

        </div>
      </div>
      <div if:true={isBuName} class="col-xs-12 eight-list-block nopadding">

        <div class="eight-list  list-block col-xs-12">
          <span class="number-of-list"> {numbers.val0} </span>
          <h5 class="required-label">Business Unit</h5>
        </div>
        <div class="col-xs-11 card list-inner-card">
          <h6>Hold down "Control", or "Command" on a Mac, to select more than one</h6>
          <p class="infoimg-btn">Business Unit: <img src={ComponentImage} class="img-responsive info-img icon"
              data-tooltip title='Select business unit'></p>


          <c-Tp-Dual-List-Box if:true={isBuName} data-id="BuName" page-action={pageAction}
            choose-list-label={allbusinessUnitData.chooseListLabel}
            selected-list-label={allbusinessUnitData.selectedListLabel} all-value={allbusinessUnitData.chooseValue}
            all-value-selected={allbusinessUnitData.selectedValue}
            ondispatchvalueparent={getSelectedBuLst}></c-Tp-Dual-List-Box>
        </div>

      </div>
      <div class="col-xs-12 eight-list-block nopadding">
        <div class="eight-list  list-block col-xs-12">
          <span class="number-of-list"> {numbers.val1} </span>
          <h5 class="required-label">Content Group</h5>
        </div>
        <div class="col-xs-11 card list-inner-card">
          <div class="col-xs-12 nopadding">
            <div class="col-xs-12 col-sm-7 nopadding dropdown-menu-search">
              <c-tp-dropdown filterval={contentGroupValue} if:true={isDropdown}
                slected-value={createArticleData.contentGroupValue} oncategoryvalselected={getDropDownValue}>
              </c-tp-dropdown>
            </div>
          </div>
        </div>
      </div>
      <div class="col-xs-12 third-list-block nopadding">
        <div class="third-list list-block col-xs-12">
          <span class="number-of-list"> {numbers.val2} </span>
          <h5 class="required-label">Headline and Body</h5>
        </div>
        <div class="col-xs-11 card list-inner-card">
          <h6>Title is limited to 100 characters or less, including spaces</h6>
          <div class="col-xs-12 nopadding ">
            <textarea class="col-xs-12 title-article" maxlength="99" data-id="articleTitle" rows="1" name=""
              placeholder="Title" form="" onchange={initiateAutoSave}>{createArticleData.articleTitle}</textarea>
            <!--<textarea class="col-xs-12 title-article" data-id="articleOpenAI" rows="1" name="" placeholder="Open AI" form="" onchange={initiateAutoSave}>{createArticleData.articleTitle}</textarea>-->
            <div>
              <div class="slds-grid" style="display: inline-flex">
              <Lightning-input variant="label-hidden" type=checkbox data-element="NeedAICheckbox" name='NeedAI'
              value={createArticleData.geoTarget} onchange={handleNeedAICheckBox}
              class="createArticleCheckBox_Style" style="padding-bottom: 5px"></Lightning-input>
              <h6 style="font-weight:bold;color:black;">Need AI Assistance to build Body content? (OPTIONAL)</h6>
            </div>
              <div if:true={enableNeedAIAssistance} class="slds-grid" style="justify-content: space-between; align-items: end; margin-bottom: 20px;">
                <lightning-textarea type="text" class="openaitextarea UIInputTextareaHeight" placeholder="Add your prompt or ask your question here and tap arrow."
                  variant="standard" value={promptMsg} disabled={viewMode}></lightning-textarea>
                <lightning-button class="sendButtonIcon" icon-name="utility:send" variant="neutral"
                  onclick={sendTextToOpenAi} type="button"></lightning-button>
              </div>
            </div>
            <div class="col-xs-12 nopadding" style="overflow: auto;padding-top: 30px;"><!--style="height: 400px;"-->
              <c-tp-Article-Editor folder-name={folderName} html-editor-allowed={htmlEditorAllowed}
                articleid={createArticleData.articleId} onfileupload={handleTinyFileUploaded}></c-tp-Article-Editor>
            </div>
          </div>
        </div>
      </div>

      <!--<div class="col-xs-12 forth-list-block nopadding">
        <div class="forth-list list-block col-xs-12">
          <span class="number-of-list"> {numbers.val3} </span>
          <h5>Pronto Links: <img src={ComponentImage} class="img-responsive info-img dis-inline icon" data-tooltip
              title={helpText.prontoHelpTxt}></h5>
        </div>
        <div class="col-xs-11 card list-inner-card">
          <div class="col-xs-12 nopadding ">
            <textarea class="col-xs-7 massEmail-article" rows="1" data-id="prontoArticle" name=""
              placeholder="Enter links separated by semicolon(;) e.g. abbviepronto://xxxx - Article Name"
              form="">{createArticleData.prontoArticle}</textarea>

          </div>
        </div>
      </div>-->

      <div class="col-xs-12 tenth-list-block nopadding">
        <div class="tenth-list list-block col-xs-12">
          <span class="number-of-list"> {numbers.val3} </span>
          <h5 class="required-label">Thumbnail Image <span class="tooltip-text">Help</span><img src={ComponentImage}
              class="img-responsive info-img dis-inline icon" data-tooltip title={helpText.thumbnailImageHelpTxt}></h5>
        </div>
        <div class="col-xs-11 card list-inner-card">
          <div class="col-xs-7"></div>

          <div class="col-xs-12 nopadding documents-form">
            <div class="col-xs-12 nopadding ">
              <div class="col-xs-4 nopadding files-text">
                <textarea class="col-xs-12 " rows="1" name="" placeholder="Thumbnail Image" form=""></textarea>
              </div>

              <div class="col-xs-7">
                <a class="btn btn-default browse-article" onclick={uploadTumbnailImage}>Browse</a>
                <template if:true={openmodal}>
                  <!-- modal start -->
                  <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
                    aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                    <div class="slds-modal__container modalContainer_Thumbnail">
                      <!-- modal header start -->
                      <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                          title="Close" onclick={uploadTumbnailImage}>
                          <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse"
                            size="small"></lightning-icon>
                          <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 id="modal-heading-01" class="slds-text-heading_large slds-hyphenate">Upload Thumbnail Image
                        </h2>
                      </header>
                      <!-- modal body start -->
                      <div class="slds-modal__content slds-p-around_medium thumbnailPopUp_Body" id="modal-content-id-1">

                        <!-- Upload New Thumbnail Block -->
                        <div class="text-center col-sm-12 col-md-12 col-lg-12" id="uploadFileHeader"
                          style="padding-bottom: 10px; padding-top: 20px;">
                          <p>You can upload a JPG,PNG OR GIF file. Maximum file size is 2 MB</p>
                        </div>
                        <div class="text-center col-sm-12 col-md-12 col-lg-12"
                          style="display: flex;     padding-bottom: 20px;">
                          <div class="text-center col-sm-6 col-md-6 col-lg-6 thumbnail_UploadButton">
                            <p>
                              <span
                                class="slds-file-selector__button slds-button slds-button_neutral cursor_pointer uploadButton"
                                onclick={openGallery}>Upload Thumbnail</span>
                              <input type="file" name="pic" onchange={updatedThumbnailPicture}
                                class="hideOption dragDropInputStyle" accept="image/png,image/jpg,image/gif, image/jpeg"
                                data-id="picture">
                            </p>
                          </div>
                          <div class="text-center col-sm-6 col-md-6 col-lg-6">
                            <div>Selected Thumbnail:</div>
                            <div class="imgRectangle">
                              <img class="thumbnail" src={SelectedScr} data-id="currentPhoto">
                            </div>
                          </div>
                        </div>
                        <div class="col-xs-12" style="color:#dc3545;" if:true={isInvalidFile}>
                          {TP_thumbnailSizeErrorMessage}</div>
                        <hr>



                        <!-- List of Thumbnails Block -->
                        <div class="thumbnailContainer col-sm-12 col-md-12 col-lg-12">
                          <div class="col-sm-12 col-md-12 col-lg-12 nullPadding">
                            <input class="form-control searchbar" maxlength="50" type="text" placeholder="Search"
                              aria-label="Search" onkeyup={handleSearchFilter}>
                          </div>
                          <div class="col-sm-12 col-md-12 col-lg-12 thumbnail_HeaderText nullPadding">Available
                            Thumbnails: </div>
                          <div class="col-sm-12 col-md-12 col-lg-12 thumbnail_ListBlock">
                            <template for:each={filteredThumbnailToDisplay} for:item='thumbnail'>
                              <a if:true={thumbnail.isSelected} key={thumbnail.Id}
                                class="col-sm-12 col-md-12 col-lg-12 thumbnailFile nullPadding anchorTagStyle">
                                <img src={thumbnail.thumbURL} class="thumnail_ImageList disabled-cls">&nbsp;
                                <!--<textarea class="col-xs-11 curson-default thumnailName disabled-cls" rows="1" name="" placeholder="Thumbnail Name" form="" readonly data-name="captureName" >{thumbnail.thumName}</textarea>-->
                                <p class="col-xs-11 curson-default thumnailName textAreaTitleAlignment disabled-cls"
                                  rows="1" name="" placeholder="Thumbnail Name" form="" readonly
                                  data-name="captureName">{thumbnail.thumName}</p>
                              </a>
                              <a if:false={thumbnail.isSelected} onclick={getThumbnailUrl} href="#uploadFileHeader"
                                key={thumbnail.Id} data-id={thumbnail.Id} data-thumid={thumbnail.thumbID}
                                data-thumburl={thumbnail.thumbURL} data-thumbname={thumbnail.thumName}
                                class="col-sm-12 col-md-12 col-lg-12 thumbnailFile nullPadding anchorTagStyle"><!--data-thumbtype={thumbnail.thumbType} data-thumbversion={thumbnail.thumbVersion}-->
                                <img src={thumbnail.thumbURL} class="thumnail_ImageList">&nbsp;
                                <!--<textarea class="col-xs-11 curson-default thumnailName" rows="1" name="" placeholder="Thumbnail Name" form="" readonly data-name="captureName" >{thumbnail.thumName}</textarea>-->
                                <p class="col-xs-11 curson-default thumnailName textAreaTitleAlignment" rows="1" name=""
                                  placeholder="Thumbnail Name" form="" readonly data-name="captureName">
                                  {thumbnail.thumName}</p>
                              </a>
                            </template>
                          </div>
                        </div>
                      </div>

                      <!-- modal footer start-->
                      <footer class="slds-modal__footer thumbnail_popUpBtnBlock">
                        <button class="slds-button slds-button btn btn-info savebtn-popup"
                          onclick={saveProfilePicture}>Insert</button>
                        <button class="slds-button btn btn-default " onclick={uploadTumbnailImage}>Cancel</button>
                      </footer>
                    </div>
                  </section>
                  <div class="slds-backdrop slds-backdrop_open"></div>
                  <!-- modal end -->
                </template>
              </div>
              <div class="col-xs-12 nopadding">
                <div class="col-xs-6 nopadding">
                  <template if:true={showthumbnailClose}>
                    <a class="btn btn-default uploaded-article" onclick={handleThumbnailPiles}>
                      {createArticleData.thumbnailName}
                      <img src={uploadedCloseImage} class="img-responsive uploaded-close">
                    </a>
                  </template>
                </div>
              </div>
              <div class="col-xs-12 col-sm-7 nopadding">
                <div class="col-xs-12 nopadding ">
                  <div class="col-xs-7 nopadding">
                    <h6>Allow Thumbnail on Article View</h6>
                  </div>
                  <div class="col-xs-5 ">
                    <label class="switch-toggle">
                      <input type="checkbox" data-id="changeThumbnailToggle" onchange={handleThumbnailToggle}>
                      <span class="slider round"></span>
                    </label>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-xs-12 seven-list-block nopadding">
        <div class="seven-list list-block col-xs-12">
          <span class="number-of-list"> {numbers.val4} </span>
          <h5>Creator</h5>
        </div>
        <div class="col-xs-11 card list-inner-card">
          <div class="col-xs-12 nopadding ">
            <div>
              <textarea data-id="creator" class="col-xs-7 readonly-sfdc" rows="1" name="" placeholder="" form=""
                disabled> {createArticleData.creatorName}</textarea>
            </div>

          </div>
        </div>
      </div>

      <div class="col-xs-12 seven-list-block nopadding">
        <div class="seven-list list-block col-xs-12">
          <span class="number-of-list"> {numbers.val5} </span>
          <h5 class="required-label">Contact Info</h5>
        </div>
        <div class="col-xs-11 card list-inner-card">
          <div class="col-xs-12 nopadding ">
            <h6>Contact Name</h6>
            <div class="col-xs-7 nopadding">
              <textarea data-id='contactName' class="col-xs-12" rows="1" name="" placeholder="Add/Search Contact Name"
                onkeyup={handleContactNameChange} form="" maxlength="200">{createArticleData.contactName}</textarea>
              <div class="add-icon" data-id="contactNameAdd" onclick={handleAddContact}>
                <lightning-icon icon-name="utility:add" alternative-text="Add" title="Add"></lightning-icon>
              </div>
              <c-tp-contact-suggestion data-id="contactDropDown" class="col-xs-7"
                oncontactdata={handleContactData}></c-tp-contact-suggestion>
            </div>
            <div class="col-xs-7 nopadding">
              <template for:each={contactData.name} for:item='value'>
                <a class="btn btn-default uploaded-article" data-id="contactNameVal" data-ind={value.ind}
                  onclick={removeContactData} key={value.ind}>
                  {value.value}
                  <img src={uploadedCloseImage} data-section="documentImageAudio" class="img-responsive uploaded-close">
                </a>
              </template>
            </div>


          </div>
          <div class="col-xs-12 nopadding ">
            <h6>Contact Email</h6>
            <div class="col-xs-7 nopadding">
              <textarea data-id='contactEmail' class="col-xs-12 massEmail-article" rows="1" name=""
                placeholder="Enter Email Addresses To Be Added" form=""
                maxlength="200">{createArticleData.contactEmail}</textarea>
              <div class="add-icon" data-id="contactEmailAdd" onclick={handleAddContact}>
                <lightning-icon icon-name="utility:add" alternative-text="Add" title="Add"></lightning-icon>
              </div>
            </div>

            <div class="col-xs-7 nopadding">
              <template for:each={contactData.email} for:item='value'>
                <a class="btn btn-default uploaded-article" data-id="contactEmailVal" data-ind={value.ind}
                  onclick={removeContactData} key={value.ind}>
                  {value.value}
                  <img src={uploadedCloseImage} data-section="documentImageAudio" class="img-responsive uploaded-close">
                </a>
              </template>
            </div>

          </div>
          <div class="col-xs-12 nopadding ">
            <h6>Contact Website</h6>
            <div class="col-xs-7 nopadding">
              <textarea data-id='contactWebsite' class="col-xs-12" rows="1" name="" placeholder="" form=""
                maxlength="200">{createArticleData.contactWebsite}</textarea>
              <div class="add-icon" data-id="contactWebsiteAdd" onclick={handleAddContact}>
                <lightning-icon icon-name="utility:add" alternative-text="Add" title="Add"></lightning-icon>
              </div>
            </div>
            <div class="col-xs-7 nopadding">
              <template for:each={contactData.website} for:item='value'>
                <a class="btn btn-default uploaded-article" data-id="contactWebsiteVal" data-ind={value.ind}
                  onclick={removeContactData} key={value.ind}>
                  {value.value}
                  <img src={uploadedCloseImage} data-section="documentImageAudio" class="img-responsive uploaded-close">
                </a>
              </template>
            </div>
          </div>
          <div class="col-xs-12 nopadding ">
            <h6>Contact Phone</h6>
            <div class="col-xs-7 nopadding">
              <textarea data-id='contactPhone' class="col-xs-12" rows="1" name="" placeholder="" form=""
                maxlength="200">{createArticleData.contactPhone}</textarea>
              <div class="add-icon" data-id="contactPhoneAdd" onclick={handleAddContact}>
                <lightning-icon icon-name="utility:add" alternative-text="Add" title="Add"></lightning-icon>
              </div>
            </div>
            <div class="col-xs-7 nopadding">
              <template for:each={contactData.phone} for:item='value'>
                <a class="btn btn-default uploaded-article" data-id="contactPhoneVal" data-ind={value.ind}
                  onclick={removeContactData} key={value.ind}>
                  {value.value}
                  <img src={uploadedCloseImage} data-section="documentImageAudio" class="img-responsive uploaded-close">
                </a>
              </template>
            </div>
          </div>
        </div>
      </div>

      <div class="col-xs-12 tenth-list-block nopadding">
        <div class="tenth-list list-block col-xs-12">
          <span class="number-of-list"> {numbers.val6} </span>
          <h5>Attachments <img src={ComponentImage} class="img-responsive info-img dis-inline icon" data-tooltip
              title={helpText.attachmentsHelpTxt}></h5>
        </div>
        <div class="col-xs-11 card list-inner-card">
          <div class="col-xs-7"></div>

          <div class="col-xs-12 nopadding documents-form">
            <div class="col-xs-12 nopadding ">
              <div class="col-xs-4 nopadding files-text">
                <textarea class="col-xs-12 " rows="1" name="" placeholder="Attachments" form=""></textarea>
              </div>

              <div class="col-xs-7">
                <a class="btn btn-default browse-article" onclick={alterVideoBrowserModalDoc}>Browse</a>
                <template if:true={docBrowse}>
                  <c-tp-Upload-Popup allowed-format={attachmentAllowed} desktop=true amazone-s3=true
                    ondatafromuploadmodal={handleDatauploadModal} folder-name={folderName}
                    onclosemodal={alterVideoBrowserModalDoc}></c-tp-Upload-Popup>
                </template>

              </div>
              <div class="col-xs-12 nopadding">
                <div class="col-xs-6 nopadding">
                  <template for:each={documentImageAudio} for:item='value'>
                    <a key={value.s3Link} data-id={value.ind} class="btn btn-default uploaded-article"
                      onclick={handleAttachPiles}>
                      {value.fileName}
                      <img src={uploadedCloseImage} data-section="documentImageAudio" data-name={value.s3Link}
                        class="img-responsive uploaded-close">
                    </a>
                  </template>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-xs-12 tenth-list-block nopadding">
        <div class="tenth-list list-block col-xs-12">
          <span class="number-of-list"> {numbers.val7} </span>
          <h5>Videos <img src={ComponentImage} class="img-responsive info-img dis-inline icon" data-tooltip
              title={helpText.videosHelpTxt}></h5>
        </div>
        <div class="col-xs-11 card list-inner-card">
          <div class="col-xs-7"></div>
          <div class="col-xs-12 nopadding documents-form">
            <div class="col-xs-12 nopadding ">
              <div class="col-xs-4 nopadding files-text">
                <textarea class="col-xs-12 " rows="1" name="" placeholder="Videos" form=""></textarea>
              </div>
              <div class="col-xs-7">
                <a href="javascript:void(0);" class="btn btn-default browse-article"
                  onclick={alterVideoBrowserModal}>Browse</a>
                <template if:true={videoBrowse}>
                  <c-tp-Upload-Popup brightcove=true onclosemodal={alterVideoBrowserModal}
                    ondatafromuploadmodal={handleDatauploadModal}></c-tp-Upload-Popup>
                </template>

              </div>
              <div class="col-xs-12 nopadding">
                <div class="col-xs-6 nopadding">
                  <template for:each={videoData} for:item='value'>
                    <a href="javascript:void(0);" key={value.fileName} class="btn btn-default uploaded-article"
                      data-id={value.ind} onclick={handleVideoPiles}>
                      {value.fileName}
                      <img src={uploadedCloseImage} class="img-responsive uploaded-close">
                    </a>
                  </template>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>

      <div class="col-xs-12 second-list-block nopadding">
        <div class="second-list list-block col-xs-12">
          <span class="number-of-list"> {numbers.val8} </span>
          <h5>Add Slideshow <img src={ComponentImage} class="img-responsive info-img dis-inline icon" data-tooltip
              title={helpText.addSlideshowHelpTxt}></h5>
        </div>
        <div class="col-xs-11 card list-inner-card">
          <div class="col-xs-12 nopadding ">
            <div class="col-xs-4 nopadding files-text">
              <textarea class="col-xs-12 " rows="1" name="" placeholder="Add Slideshow" form=""></textarea>
            </div>
            <div class="col-xs-7">
              <a class="btn btn-default browse-article" onclick={alertSlideshowBrowser}>Browse</a>
              <template if:true={slideshowBrowse}>
                <!-- Original Code -->
                <!-- <c-tp-Upload-Popup allowed-format={slideShowAllowed} desktop=true amazone-s3=true ondatafromuploadmodal={handleslideShowData} folder-name = {folderName} onclosemodal={alertSlideshowBrowser}></c-tp-Upload-Popup> -->

                <!-- Testing the -->
                <c-tp-Upload-Popup-Sample slideshowdata={slideShowData} allowed-format={slideShowAllowed} desktop=true
                  amazone-s3=true ondatafromuploadmodal={handleslideShowData} folder-name={folderName}
                  onclosemodal={alertSlideshowBrowser}></c-tp-Upload-Popup-Sample>
              </template>
            </div>
            <div class="col-xs-12 nopadding">
